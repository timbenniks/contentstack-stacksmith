name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run publish in dry-run mode"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          DSL_VERSION=$(node -p "require('./packages/dsl/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Tag: $TAG_VERSION | DSL: $DSL_VERSION | CLI: $CLI_VERSION"
          if [ "$TAG_VERSION" != "$DSL_VERSION" ] || [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match DSL ($DSL_VERSION) or CLI ($CLI_VERSION)"
            exit 1
          fi

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

      - name: Publish @timbenniks/contentstack-stacksmith
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            pnpm --filter @timbenniks/contentstack-stacksmith publish --dry-run --no-git-checks
          else
            pnpm --filter @timbenniks/contentstack-stacksmith publish --access public --no-git-checks
          fi

      - name: Publish @timbenniks/contentstack-stacksmith-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            pnpm --filter @timbenniks/contentstack-stacksmith-cli publish --dry-run --no-git-checks
          else
            pnpm --filter @timbenniks/contentstack-stacksmith-cli publish --access public --no-git-checks
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && !inputs.dry-run
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
